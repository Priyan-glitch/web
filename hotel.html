<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 14px;
}

.success {
    color: green;
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Hotel Booking Form</h2>

<form id="bookingForm">

<label>Full Name</label>
<input type="text" id="fullname">
<div class="error" id="nameError"></div>

<label>Email Address</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>

<label>Mobile Number</label>
<input type="text" id="mobile">
<div class="error" id="mobileError"></div>

<label>Check-in Date</label>
<input type="date" id="checkin">
<div class="error" id="checkinError"></div>

<label>Check-out Date</label>
<input type="date" id="checkout">
<div class="error" id="checkoutError"></div>

<label>Number of Guests</label>
<input type="number" id="guests">
<div class="error" id="guestsError"></div>

<label>Room Type</label>
<select id="room">
    <option value="">Select</option>
    <option value="Single">Single</option>
    <option value="Double">Double</option>
    <option value="Suite">Suite</option>
</select>
<div class="error" id="roomError"></div>

<button type="submit">Book Now</button>
<div class="success" id="successMessage"></div>

</form>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(event){

    event.preventDefault();  // Prevent page reload

    let valid = true;

    // Get values
    let fullname = document.getElementById("fullname").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;
    let guests = document.getElementById("guests").value;
    let room = document.getElementById("room").value;

    // Clear previous messages
    document.querySelectorAll(".error").forEach(e => e.innerText = "");
    document.getElementById("successMessage").innerText = "";

    // 1. Full Name Validation
    let namePattern = /^[A-Za-z\s]+$/;
    if(fullname === ""){
        document.getElementById("nameError").innerText = "Full Name cannot be empty";
        valid = false;
    }
    else if(!namePattern.test(fullname)){
        document.getElementById("nameError").innerText = "Name must contain only alphabets";
        valid = false;
    }

    // 2. Email Validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!emailPattern.test(email)){
        document.getElementById("emailError").innerText = "Enter valid email (example@domain.com)";
        valid = false;
    }

    // 3. Mobile Validation
    let mobilePattern = /^[0-9]{10}$/;
    if(!mobilePattern.test(mobile)){
        document.getElementById("mobileError").innerText = "Mobile must be exactly 10 digits";
        valid = false;
    }

    // 4. Check-in Date Validation
    let today = new Date().toISOString().split("T")[0];
    if(checkin === ""){
        document.getElementById("checkinError").innerText = "Select check-in date";
        valid = false;
    }
    else if(checkin < today){
        document.getElementById("checkinError").innerText = "Check-in cannot be past date";
        valid = false;
    }

    // 5. Check-out Validation
    if(checkout === ""){
        document.getElementById("checkoutError").innerText = "Select check-out date";
        valid = false;
    }
    else if(checkout <= checkin){
        document.getElementById("checkoutError").innerText = "Check-out must be after check-in";
        valid = false;
    }

    // 6. Guests Validation
    if(guests <= 0 || guests > 6){
        document.getElementById("guestsError").innerText = "Guests must be between 1 and 6";
        valid = false;
    }

    // 7. Room Type Validation
    if(room === ""){
        document.getElementById("roomError").innerText = "Please select room type";
        valid = false;
    }

    // 8 & 9 Final Submission
    if(valid){
        document.getElementById("successMessage").innerText = "Booking Successful";
        document.getElementById("bookingForm").reset();
    }

});
</script>

</body>
</html>
