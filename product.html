<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>

<h3>Select Products</h3>

<input type="checkbox" value="100" onclick="total()"> Product A - 100<br>
<input type="checkbox" value="200" onclick="total()"> Product B - 200<br>
<input type="checkbox" value="300" onclick="total()"> Product C - 300<br>

<p>Total: <span id="sum">0</span></p>

<h3>Payment</h3>

<form onsubmit="return validate()">
    Card Number: <input type="text" id="card"><br><br>
    Expiry: <input type="month" id="exp"><br><br>
    CVV: <input type="password" id="cvv"><br><br>
    <button type="submit">Pay</button>
</form>

<p id="msg"></p>

<script>
function total() {
    let c = document.querySelectorAll("input[type='checkbox']");
    let s = 0;
    c.forEach(x => { if (x.checked) s += +x.value; });
    document.getElementById("sum").innerText = s;
}

function validate() {
    let card = document.getElementById("card").value.replace(/\s/g,"");
    let exp = document.getElementById("exp").value;
    let cvv = document.getElementById("cvv").value;
    let sum = document.getElementById("sum").innerText;

    if (sum == 0) {
        alert("Select product");
        return false;
    }

    if (!/^\d{16}$/.test(card)) {
        alert("Invalid card");
        return false;
    }

    if (!/^\d{3}$/.test(cvv)) {
        alert("Invalid CVV");
        return false;
    }

    let now = new Date();
    let e = new Date(exp);

    if (e <= now) {
        alert("Expired card");
        return false;
    }

    document.getElementById("msg").innerText = "Payment Successful";
    return false;
}
</script>

</body>
</html>
