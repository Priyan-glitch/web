<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Form Validation</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    padding: 25px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
}

button {
    padding: 10px;
    width: 100%;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 14px;
}

.success {
    color: green;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
<h2>Advanced Payment Form</h2>

<form id="paymentForm">

<label>Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>

<label>Credit Card Number</label>
<input type="text" id="card" maxlength="16">
<div class="error" id="cardError"></div>

<label>CVV</label>
<input type="text" id="cvv" maxlength="3">
<div class="error" id="cvvError"></div>

<label>Expiry Date</label>
<select id="month"></select>
<select id="year"></select>
<div class="error" id="expiryError"></div>

<button type="submit">Submit</button>
<div class="success" id="successMsg"></div>

</form>
</div>

<script>

// ==========================
// 1. Generate Month & Year Dynamically
// ==========================

let monthSelect = document.getElementById("month");
let yearSelect = document.getElementById("year");

// Generate months 01 - 12
for(let i=1; i<=12; i++){
    let option = document.createElement("option");
    option.value = i.toString().padStart(2,'0');
    option.text = i.toString().padStart(2,'0');
    monthSelect.appendChild(option);
}

// Generate years (current year to +10 years)
let currentYear = new Date().getFullYear();
for(let i=currentYear; i<=currentYear+10; i++){
    let option = document.createElement("option");
    option.value = i;
    option.text = i;
    yearSelect.appendChild(option);
}

// ==========================
// 2. Auto Focus Movement
// ==========================

document.getElementById("card").addEventListener("input", function(){
    if(this.value.length === 16){
        document.getElementById("cvv").focus();
    }
});

document.getElementById("cvv").addEventListener("input", function(){
    if(this.value.length === 3){
        document.getElementById("month").focus();
    }
});

// ==========================
// 3. Form Validation
// ==========================

document.getElementById("paymentForm").addEventListener("submit", function(event){

    event.preventDefault();
    let valid = true;

    let name = document.getElementById("name").value.trim();
    let card = document.getElementById("card").value.trim();
    let cvv = document.getElementById("cvv").value.trim();
    let month = monthSelect.value;
    let year = yearSelect.value;

    // Clear errors
    document.querySelectorAll(".error").forEach(e => e.innerText="");
    document.getElementById("successMsg").innerText="";

    // Name validation (only alphabets)
    let nameRegex = /^[A-Za-z\s]+$/;
    if(!nameRegex.test(name)){
        document.getElementById("nameError").innerText = "Name must contain only alphabets.";
        valid = false;
    }

    // Credit Card validation
    // Example rule: must start with 4 or 5 and be 16 digits
    let cardRegex = /^(4|5)[0-9]{15}$/;
    if(!cardRegex.test(card)){
        document.getElementById("cardError").innerText =
        "Card must start with 4 or 5 and contain 16 digits.";
        valid = false;
    }

    // CVV validation (3 digits)
    let cvvRegex = /^[0-9]{3}$/;
    if(!cvvRegex.test(cvv)){
        document.getElementById("cvvError").innerText =
        "CVV must be exactly 3 digits.";
        valid = false;
    }

    // Expiry validation (must be future date)
    let today = new Date();
    let selectedDate = new Date(year, month - 1);

    if(selectedDate <= today){
        document.getElementById("expiryError").innerText =
        "Expiry date must be in the future.";
        valid = false;
    }

    if(valid){
        document.getElementById("successMsg").innerText =
        "Payment Details Validated Successfully!";
        document.getElementById("paymentForm").reset();
    }

});

</script>

</body>
</html>
